services:
  xiaoyu:
    build:
      context: .
      dockerfile: Dockerfile
    image: xiaoyu:latest
    container_name: xiaoyu
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      JAVA_OPTS: "-Xms512m -Xmx512m"
      SPRING_APPLICATION_JSON: >
        {
          "xiaoyu": {
            "datasource": {
              "driver-class-name": "com.mysql.cj.jdbc.Driver",
              "host": "mysql",
              "port": 3306,
              "database": "xiaoyu",
              "username": "root",
              "password": "123456"
            },
            "redis": {
              "host": "redis",
              "port": 6379,
              "password": "",
              "database": 0
            },
            "elasticsearch": {
              "uris": "http://elasticsearch:9200",
              "username": "",
              "password": ""
            }
          },
          "sky": {
            "datasource": {
              "driver-class-name": "com.mysql.cj.jdbc.Driver",
              "host": "mysql",
              "port": 3306,
              "database": "xiaoyu",
              "username": "root",
              "password": "123456"
            },
            "redis": {
              "host": "redis",
              "port": 6379,
              "password": "",
              "database": 0
            }
          },
          "spring": {
            "rabbitmq": {
              "host": "rabbitmq",
              "port": 5672,
              "username": "admin",
              "password": "admin"
            }
          }
        }

  mysql:
    image: mysql:8.0
    container_name: xiaoyu-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_DATABASE: xiaoyu
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mydb_structure.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.2
    container_name: xiaoyu-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: xiaoyu-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
      TZ: Asia/Shanghai
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.3
    container_name: xiaoyu-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
      TZ: Asia/Shanghai
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200 >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20

volumes:
  mysql-data:
  redis-data:
  rabbitmq-data:
  elasticsearch-data:
